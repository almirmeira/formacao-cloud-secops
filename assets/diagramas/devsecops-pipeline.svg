  <text x="662" y="176" font-size="8" fill="#fecaca">• Aqua Security</text>
  <text x="662" y="196" font-size="9" font-weight="bold" fill="#fca5a5">Postura (CSPM)</text>
  <text x="662" y="212" font-size="8" fill="#fecaca">• Prowler (AWS)</text>
  <text x="662" y="226" font-size="8" fill="#fecaca">• Wiz / Orca</text>
  <text x="662" y="240" font-size="8" fill="#fecaca">• Defender for Cloud</text>
  <text x="662" y="260" font-size="9" font-weight="bold" fill="#fca5a5">CWPP</text>
  <text x="662" y="276" font-size="8" fill="#fecaca">• Network policies</text>
  <text x="662" y="290" font-size="8" fill="#fecaca">• Secrets rotation</text>
  <text x="662" y="304" font-size="8" fill="#fecaca">• Vault / KMS</text>
