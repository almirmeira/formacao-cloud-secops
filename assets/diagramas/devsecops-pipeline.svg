  <rect x="178" y="104" width="130" height="12" fill="#15803d"/>
  <text x="243" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">BUILD</text>
  <text x="243" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#86efac">Container Build</text>
  <text x="188" y="148" font-size="8" fill="#bbf7d0">• Docker build</text>
  <text x="188" y="162" font-size="8" fill="#bbf7d0">• Multi-stage</text>
  <text x="188" y="176" font-size="8" fill="#bbf7d0">• Distroless base</text>
  <text x="188" y="190" font-size="8" fill="#bbf7d0">• Non-root user</text>
  <text x="188" y="210" font-size="9" font-weight="bold" fill="#86efac">Image Scanning</text>
  <text x="188" y="226" font-size="8" fill="#bbf7d0">• Trivy (OS + libs)</text>
  <text x="188" y="240" font-size="8" fill="#bbf7d0">• Grype</text>
  <text x="188" y="254" font-size="8" fill="#bbf7d0">• Snyk Container</text>
  <text x="188" y="274" font-size="9" font-weight="bold" fill="#86efac">SBOM</text>
  <text x="188" y="290" font-size="8" fill="#bbf7d0">• Syft (CycloneDX)</text>
