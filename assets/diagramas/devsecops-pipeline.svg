  <text x="500" y="56" text-anchor="middle" font-size="11" fill="#64748b">CECyber · Curso 4 · CNAPP, IaC e DevSecOps · Ferramentas open-source e comerciais</text>
  <line x1="20" y1="68" x2="980" y2="68" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ETAPA 1: CODE -->
  <rect x="20" y="88" width="130" height="280" rx="10" fill="#0f1928" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="88" width="130" height="28" rx="10" fill="#1d4ed8"/>
  <rect x="20" y="104" width="130" height="12" fill="#1d4ed8"/>
  <text x="85" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">CODE</text>
  <text x="85" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#60a5fa">IaC Security</text>
  <text x="30" y="148" font-size="8" fill="#93c5fd">• Checkov</text>
  <text x="30" y="162" font-size="8" fill="#93c5fd">• tfsec</text>
  <text x="30" y="176" font-size="8" fill="#93c5fd">• KICS</text>
  <text x="30" y="190" font-size="8" fill="#93c5fd">• Trivy (IaC)</text>
  <text x="30" y="210" font-size="9" font-weight="bold" fill="#60a5fa">Policy as Code</text>
  <text x="30" y="226" font-size="8" fill="#93c5fd">• OPA + Rego</text>
  <text x="30" y="240" font-size="8" fill="#93c5fd">• Conftest</text>
  <text x="30" y="254" font-size="8" fill="#93c5fd">• HashiCorp</text>
  <text x="30" y="266" font-size="8" fill="#93c5fd">  Sentinel</text>
  <text x="30" y="286" font-size="9" font-weight="bold" fill="#60a5fa">Secrets</text>
  <text x="30" y="302" font-size="8" fill="#93c5fd">• detect-secrets</text>
  <text x="30" y="316" font-size="8" fill="#93c5fd">• gitleaks</text>
  <text x="30" y="330" font-size="8" fill="#93c5fd">• truffleHog</text>
  <text x="85" y="356" text-anchor="middle" font-size="9" fill="#1d4ed8">Desenvolvedor</text>
  <text x="85" y="368" text-anchor="middle" font-size="9" fill="#1d4ed8">corrige antes</text>
  <text x="85" y="380" text-anchor="middle" font-size="9" fill="#1d4ed8">do PR/merge</text>

  <!-- Seta -->
  <line x1="150" y1="228" x2="178" y2="228" stroke="#334155" stroke-width="2" marker-end="url(#arr-main)"/>

