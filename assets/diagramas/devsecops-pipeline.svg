  <text x="565" y="478" text-anchor="middle" font-size="8" fill="#64748b">  + alertar dev team</text>

  <rect x="650" y="432" width="140" height="50" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
