  <rect x="494" y="104" width="130" height="12" fill="#6d28d9"/>
  <text x="559" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">DEPLOY</text>
  <text x="559" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#c4b5fd">Verify + Admit</text>
  <text x="504" y="148" font-size="8" fill="#ddd6fe">• Verificar assinatura</text>
  <text x="504" y="162" font-size="8" fill="#ddd6fe">  Cosign antes deploy</text>
  <text x="504" y="182" font-size="9" font-weight="bold" fill="#c4b5fd">Admission Control</text>
  <text x="504" y="198" font-size="8" fill="#ddd6fe">• Kyverno policies</text>
  <text x="504" y="212" font-size="8" fill="#ddd6fe">• OPA Gatekeeper</text>
  <text x="504" y="226" font-size="8" fill="#ddd6fe">• Non-root enforce</text>
  <text x="504" y="240" font-size="8" fill="#ddd6fe">• Resource limits</text>
  <text x="504" y="254" font-size="8" fill="#ddd6fe">• No hostPath</text>
  <text x="504" y="274" font-size="9" font-weight="bold" fill="#c4b5fd">K8s Security</text>
  <text x="504" y="290" font-size="8" fill="#ddd6fe">• Pod Security Std.</text>
  <text x="504" y="304" font-size="8" fill="#ddd6fe">• NetworkPolicy</text>
  <text x="504" y="318" font-size="8" fill="#ddd6fe">• RBAC mínimo</text>
  <text x="559" y="360" text-anchor="middle" font-size="9" fill="#6d28d9">Deploy rejeitado</text>
  <text x="559" y="372" text-anchor="middle" font-size="9" fill="#6d28d9">se violar políticas</text>

