  <text x="346" y="162" font-size="8" fill="#fde68a">• Keyless (OIDC)</text>
  <text x="346" y="176" font-size="8" fill="#fde68a">• Attestation SBOM</text>
  <text x="346" y="190" font-size="8" fill="#fde68a">• Transparency log</text>
  <text x="346" y="210" font-size="9" font-weight="bold" fill="#fcd34d">Registry</text>
  <text x="346" y="226" font-size="8" fill="#fde68a">• Amazon ECR</text>
  <text x="346" y="240" font-size="8" fill="#fde68a">• Azure ACR</text>
  <text x="346" y="254" font-size="8" fill="#fde68a">• GCR / Artifact</text>
  <text x="346" y="274" font-size="9" font-weight="bold" fill="#fcd34d">SLSA Level</text>
  <text x="346" y="290" font-size="8" fill="#fde68a">• Build provenance</text>
  <text x="346" y="304" font-size="8" fill="#fde68a">• Supply chain sec.</text>
  <text x="401" y="356" text-anchor="middle" font-size="9" fill="#b45309">Apenas imagens</text>
  <text x="401" y="368" text-anchor="middle" font-size="9" fill="#b45309">assinadas fazem</text>
  <text x="401" y="380" text-anchor="middle" font-size="9" fill="#b45309">push para registry</text>

  <!-- Seta -->
  <line x1="466" y1="228" x2="494" y2="228" stroke="#334155" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- ETAPA 4: DEPLOY (Admission Control) -->
