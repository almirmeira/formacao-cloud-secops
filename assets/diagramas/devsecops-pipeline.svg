  <text x="410" y="478" text-anchor="middle" font-size="8" fill="#64748b">  bloqueio do commit</text>

  <rect x="495" y="432" width="140" height="50" rx="6" fill="#1e293b" stroke="#9333ea" stroke-width="1"/>
