  <circle cx="450" cy="155" r="30" fill="#059669" opacity="0.9"/>
  <text x="450" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">40%</text>
  <text x="450" y="167" text-anchor="middle" font-size="9" fill="#a7f3d0">do tempo</text>

  <text x="450" y="208" text-anchor="middle" font-size="15" font-weight="bold" fill="#34d399">Laboratórios</text>
  <text x="450" y="224" text-anchor="middle" font-size="11" fill="#6ee7b7">Aprendizado Prático</text>

