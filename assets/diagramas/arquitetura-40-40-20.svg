  <text x="735" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">20%</text>
  <text x="735" y="167" text-anchor="middle" font-size="9" fill="#e9d5ff">do tempo</text>

  <text x="735" y="208" text-anchor="middle" font-size="15" font-weight="bold" fill="#c084fc">Live Online</text>
  <text x="735" y="224" text-anchor="middle" font-size="11" fill="#d8b4fe">Aprendizado Síncrono</text>

  <!-- Ícone webcam/live -->
  <circle cx="735" cy="250" r="14" fill="#4c1d95" stroke="#9333ea" stroke-width="1.5"/>
  <circle cx="735" cy="250" r="6" fill="#9333ea"/>
  <circle cx="735" cy="238" r="3" fill="#a78bfa"/>
  <line x1="735" y1="264" x2="735" y2="270" stroke="#9333ea" stroke-width="2"/>
  <line x1="725" y1="270" x2="745" y2="270" stroke="#9333ea" stroke-width="2"/>

  <line x1="630" y1="284" x2="850" y2="284" stroke="#3b0764" stroke-width="1"/>

  <!-- Bullets pilar 3 -->
  <circle cx="650" cy="304" r="4" fill="#a855f7"/>
  <text x="664" y="308" font-size="11" fill="#cbd5e1">Labs ao vivo (65% do live)</text>
  <circle cx="650" cy="328" r="4" fill="#a855f7"/>
  <text x="664" y="332" font-size="11" fill="#cbd5e1">Mentoria de checkpoint</text>
  <circle cx="650" cy="352" r="4" fill="#a855f7"/>
  <text x="664" y="356" font-size="11" fill="#cbd5e1">Casos reais do Brasil</text>
  <circle cx="650" cy="376" r="4" fill="#a855f7"/>
  <text x="664" y="380" font-size="11" fill="#cbd5e1">Abertura e defesa capstone</text>
  <circle cx="650" cy="400" r="4" fill="#a855f7"/>
  <text x="664" y="404" font-size="11" fill="#cbd5e1">Turma: 15–20 alunos/live</text>
  <circle cx="650" cy="424" r="4" fill="#a855f7"/>
  <text x="664" y="428" font-size="11" fill="#cbd5e1">Instrutor titular fixo</text>

  <!-- === SETA CENTRAL: TEMPO TOTAL PRÁTICO === -->
  <!-- Barra inferior de resumo -->
  <rect x="40" y="466" width="820" height="44" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="220" y="492" text-anchor="middle" font-size="13" fill="#94a3b8">Prática total efetiva:</text>
  <text x="420" y="492" text-anchor="middle" font-size="15" font-weight="bold" fill="#f59e0b">~53% do tempo</text>
  <text x="630" y="492" text-anchor="middle" font-size="12" fill="#64748b">(Labs autoguiados 40% + Labs ao vivo ~13%)</text>

  <!-- Conector entre pilares -->
  <line x1="290" y1="290" x2="325" y2="290" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="575" y1="290" x2="610" y2="290" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
