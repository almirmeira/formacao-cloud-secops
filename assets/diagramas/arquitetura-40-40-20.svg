  <circle cx="365" cy="304" r="4" fill="#10b981"/>
  <text x="379" y="308" font-size="11" fill="#cbd5e1">Labs guiados (step-by-step)</text>
  <circle cx="365" cy="328" r="4" fill="#10b981"/>
  <text x="379" y="332" font-size="11" fill="#cbd5e1">Labs desafio (sem guia)</text>
  <circle cx="365" cy="352" r="4" fill="#10b981"/>
  <text x="379" y="356" font-size="11" fill="#cbd5e1">Capstone integrador</text>
  <circle cx="365" cy="376" r="4" fill="#10b981"/>
  <text x="379" y="380" font-size="11" fill="#cbd5e1">Tenants reais: Azure/AWS/GCP</text>
  <circle cx="365" cy="400" r="4" fill="#10b981"/>
  <text x="379" y="404" font-size="11" fill="#cbd5e1">CECyber Play Labs</text>
  <circle cx="365" cy="424" r="4" fill="#10b981"/>
  <text x="379" y="428" font-size="11" fill="#cbd5e1">Validação automatizada</text>

