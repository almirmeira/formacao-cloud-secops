  <rect x="428" y="234" width="44" height="32" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="432" y="249" font-size="10" fill="#34d399" font-family="monospace">$ _</text>
  <text x="432" y="261" font-size="8" fill="#059669" font-family="monospace">▶ run</text>

  <line x1="345" y1="284" x2="565" y2="284" stroke="#064e3b" stroke-width="1"/>

