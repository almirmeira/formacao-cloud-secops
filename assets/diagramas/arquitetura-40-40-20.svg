<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Fundo -->
  <rect width="900" height="520" fill="#0f1923" rx="16"/>

  <!-- Título -->
  <text x="450" y="46" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8eaf0">Modelo Pedagógico</text>
  <text x="450" y="70" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">40 / 40 / 20</text>
  <text x="450" y="94" text-anchor="middle" font-size="13" fill="#8892a4">CECyber — Formação Security Operations em Nuvem</text>

  <!-- Linha separadora -->
  <line x1="60" y1="110" x2="840" y2="110" stroke="#2a3548" stroke-width="1.5"/>

  <!-- === PILAR 1: VIDEOAULAS (40%) === -->
  <rect x="40" y="128" width="250" height="320" rx="14" fill="#1a2744" stroke="#2563eb" stroke-width="2"/>
  <!-- Badge percentual -->
  <circle cx="165" cy="155" r="30" fill="#2563eb" opacity="0.9"/>
  <text x="165" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">40%</text>
  <text x="165" y="167" text-anchor="middle" font-size="9" fill="#bfdbfe">do tempo</text>

  <text x="165" y="208" text-anchor="middle" font-size="15" font-weight="bold" fill="#60a5fa">Videoaulas</text>
  <text x="165" y="224" text-anchor="middle" font-size="11" fill="#93c5fd">Aprendizado Assíncrono</text>

  <!-- Ícone câmera -->
  <rect x="143" y="234" width="44" height="32" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="165" cy="250" r="9" fill="#2563eb"/>
  <circle cx="165" cy="250" r="5" fill="#60a5fa"/>
  <rect x="182" y="241" width="10" height="7" rx="2" fill="#3b82f6"/>

  <line x1="60" y1="284" x2="280" y2="284" stroke="#1e3a8a" stroke-width="1"/>

  <!-- Bullets pilar 1 -->
  <circle cx="80" cy="304" r="4" fill="#3b82f6"/>
  <text x="94" y="308" font-size="11" fill="#cbd5e1">Pílulas de 8–15 minutos</text>
  <circle cx="80" cy="328" r="4" fill="#3b82f6"/>
  <text x="94" y="332" font-size="11" fill="#cbd5e1">Talking head + animações</text>
  <circle cx="80" cy="352" r="4" fill="#3b82f6"/>
  <text x="94" y="356" font-size="11" fill="#cbd5e1">Quizzes integrados</text>
  <circle cx="80" cy="376" r="4" fill="#3b82f6"/>
  <text x="94" y="380" font-size="11" fill="#cbd5e1">Legendas e transcrição</text>
  <circle cx="80" cy="400" r="4" fill="#3b82f6"/>
  <text x="94" y="404" font-size="11" fill="#cbd5e1">Revisão semestral</text>
  <circle cx="80" cy="424" r="4" fill="#3b82f6"/>
  <text x="94" y="428" font-size="11" fill="#cbd5e1">LMS + SCORM/xAPI</text>

