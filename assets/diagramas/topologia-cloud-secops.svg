<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Fundo -->
  <rect width="1000" height="700" fill="#0a0e1a" rx="16"/>

  <!-- Título -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">Topologia de Security Operations em Nuvem (Multi-Cloud)</text>
  <text x="500" y="60" text-anchor="middle" font-size="12" fill="#64748b">Visão Arquitetural · SIEM · SOAR · CSPM · CWPP · Threat Intelligence</text>
  <line x1="30" y1="74" x2="970" y2="74" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ================== INTERNET / AMEAÇAS ================== -->
  <ellipse cx="500" cy="115" rx="110" ry="28" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="500" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef4444">INTERNET</text>
  <text x="500" y="127" text-anchor="middle" font-size="10" fill="#fca5a5">Ameaças · APTs · Ransomware</text>

  <!-- Setas de ameaça -->
  <line x1="390" y1="135" x2="280" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="500" y1="143" x2="500" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="610" y1="135" x2="720" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <!-- ================== CAMADA DE PROTEÇÃO DE BORDA ================== -->
  <!-- WAF / DDoS / CDN -->
  <rect x="80" y="175" width="150" height="55" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="155" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">WAF / Anti-DDoS</text>
  <text x="155" y="212" text-anchor="middle" font-size="10" fill="#fde68a">AWS Shield · Azure WAF</text>
  <text x="155" y="224" text-anchor="middle" font-size="10" fill="#fde68a">Cloudflare · Akamai</text>

  <!-- DNS Security -->
  <rect x="420" y="175" width="160" height="55" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">DNS Security</text>
  <text x="500" y="212" text-anchor="middle" font-size="10" fill="#fde68a">Route 53 DNS Firewall</text>
  <text x="500" y="224" text-anchor="middle" font-size="10" fill="#fde68a">Azure DNS · Cloud DNS</text>

  <!-- CASB / SSE -->
  <rect x="760" y="175" width="160" height="55" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="840" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">CASB / SSE / ZTNA</text>
  <text x="840" y="212" text-anchor="middle" font-size="10" fill="#fde68a">Zscaler · Netskope</text>
  <text x="840" y="224" text-anchor="middle" font-size="10" fill="#fde68a">Prisma Access · Cisco</text>

  <!-- ================== NUVENS (WORKLOADS) ================== -->
  <!-- Google Cloud -->
  <rect x="30" y="260" width="195" height="120" rx="10" fill="#0f2235" stroke="#4285f4" stroke-width="2"/>
  <rect x="30" y="260" width="195" height="26" rx="10" fill="#4285f4"/>
  <rect x="30" y="274" width="195" height="12" fill="#4285f4"/>
  <text x="128" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">GOOGLE CLOUD</text>
  <text x="128" y="304" text-anchor="middle" font-size="10" fill="#93c5fd">Compute Engine · GKE</text>
  <text x="128" y="318" text-anchor="middle" font-size="10" fill="#93c5fd">Cloud Storage · BigQuery</text>
  <text x="128" y="333" text-anchor="middle" font-size="10" fill="#93c5fd">Cloud Armor · Chronicle</text>
  <text x="128" y="348" text-anchor="middle" font-size="10" fill="#93c5fd">Google SecOps · GCP SCC</text>
  <text x="128" y="371" text-anchor="middle" font-size="11" font-weight="bold" fill="#60a5fa">SecOps: Google SecOps</text>

  <!-- Azure -->
  <rect x="250" y="260" width="220" height="120" rx="10" fill="#1a0f35" stroke="#0078d4" stroke-width="2"/>
  <rect x="250" y="260" width="220" height="26" rx="10" fill="#0078d4"/>
  <rect x="250" y="274" width="220" height="12" fill="#0078d4"/>
  <text x="360" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">MICROSOFT AZURE</text>
  <text x="360" y="304" text-anchor="middle" font-size="10" fill="#a5b4fc">Virtual Machines · AKS</text>
  <text x="360" y="318" text-anchor="middle" font-size="10" fill="#a5b4fc">Azure Storage · Entra ID</text>
  <text x="360" y="333" text-anchor="middle" font-size="10" fill="#a5b4fc">Defender XDR · Sentinel</text>
  <text x="360" y="348" text-anchor="middle" font-size="10" fill="#a5b4fc">Defender for Cloud · PIM</text>
  <text x="360" y="371" text-anchor="middle" font-size="11" font-weight="bold" fill="#818cf8">SecOps: MS Sentinel &amp; Defender</text>

  <!-- AWS -->
  <rect x="495" y="260" width="220" height="120" rx="10" fill="#1f1000" stroke="#ff9900" stroke-width="2"/>
  <rect x="495" y="260" width="220" height="26" rx="10" fill="#ff9900"/>
  <rect x="495" y="274" width="220" height="12" fill="#ff9900"/>
  <text x="605" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">AMAZON AWS</text>
  <text x="605" y="304" text-anchor="middle" font-size="10" fill="#fcd34d">EC2 · EKS · Lambda</text>
  <text x="605" y="318" text-anchor="middle" font-size="10" fill="#fcd34d">S3 · RDS · Organizations</text>
  <text x="605" y="333" text-anchor="middle" font-size="10" fill="#fcd34d">GuardDuty · Security Hub</text>
  <text x="605" y="348" text-anchor="middle" font-size="10" fill="#fcd34d">Detective · Macie · Config</text>
  <text x="605" y="371" text-anchor="middle" font-size="11" font-weight="bold" fill="#f59e0b">SecOps: AWS Cloud Security Ops</text>

  <!-- On-Premises / Híbrido -->
  <rect x="740" y="260" width="195" height="120" rx="10" fill="#0f1a0f" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="740" y="260" width="195" height="26" rx="10" fill="#15803d"/>
  <rect x="740" y="274" width="195" height="12" fill="#15803d"/>
  <text x="838" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">ON-PREMISES / HÍBRIDO</text>
  <text x="838" y="304" text-anchor="middle" font-size="10" fill="#86efac">Datacenters corporativos</text>
  <text x="838" y="318" text-anchor="middle" font-size="10" fill="#86efac">Active Directory / LDAP</text>
  <text x="838" y="333" text-anchor="middle" font-size="10" fill="#86efac">Firewalls · IDS/IPS</text>
  <text x="838" y="348" text-anchor="middle" font-size="10" fill="#86efac">SIEM legado · Endpoints</text>
  <text x="838" y="371" text-anchor="middle" font-size="11" font-weight="bold" fill="#4ade80">Conectores: Arc / Bindplane</text>

  <!-- ================== CAMADA DE MONITORAMENTO: LOGS ================== -->
  <!-- Setas de log para cima (para o SOC) -->
  <line x1="128" y1="380" x2="128" y2="438" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="360" y1="380" x2="360" y2="438" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arr-azure)"/>
  <line x1="605" y1="380" x2="605" y2="438" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arr-aws)"/>
  <line x1="838" y1="380" x2="838" y2="438" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ================== CAMADA DE DETECÇÃO / SOC ================== -->
  <rect x="30" y="440" width="820" height="90" rx="12" fill="#0c1628" stroke="#6366f1" stroke-width="2"/>
  <text x="440" y="462" text-anchor="middle" font-size="14" font-weight="bold" fill="#a5b4fc">CAMADA DE DETECÇÃO E RESPOSTA (SOC)</text>

  <!-- Componentes SOC -->
  <rect x="50" y="470" width="130" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="115" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">SIEM Multi-Cloud</text>
  <text x="115" y="504" text-anchor="middle" font-size="9" fill="#8b5cf6">Sentinel · Chronicle</text>
  <text x="115" y="516" text-anchor="middle" font-size="9" fill="#8b5cf6">Splunk · QRadar</text>

  <rect x="195" y="470" width="130" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="260" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">SOAR</text>
  <text x="260" y="504" text-anchor="middle" font-size="9" fill="#8b5cf6">Logic Apps · XSOAR</text>
  <text x="260" y="516" text-anchor="middle" font-size="9" fill="#8b5cf6">Google SOAR · Splunk</text>

  <rect x="340" y="470" width="130" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="405" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">CSPM / CNAPP</text>
  <text x="405" y="504" text-anchor="middle" font-size="9" fill="#8b5cf6">Wiz · Prisma Cloud</text>
  <text x="405" y="516" text-anchor="middle" font-size="9" fill="#8b5cf6">Orca · Lacework</text>

  <rect x="485" y="470" width="130" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="550" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">EDR / XDR</text>
  <text x="550" y="504" text-anchor="middle" font-size="9" fill="#8b5cf6">Defender · CrowdStrike</text>
  <text x="550" y="516" text-anchor="middle" font-size="9" fill="#8b5cf6">SentinelOne · Falcon</text>

  <rect x="630" y="470" width="140" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="700" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">Threat Intelligence</text>
  <text x="700" y="504" text-anchor="middle" font-size="9" fill="#8b5cf6">Mandiant · Unit 42</text>
  <text x="700" y="516" text-anchor="middle" font-size="9" fill="#8b5cf6">VirusTotal · MITRE</text>

  <!-- ================== CAMADA: IDENTIDADE E IAM ================== -->
  <line x1="440" y1="530" x2="440" y2="558" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)"/>

  <rect x="30" y="560" width="820" height="60" rx="10" fill="#160d2a" stroke="#9333ea" stroke-width="1.5"/>
  <text x="180" y="583" text-anchor="middle" font-size="12" font-weight="bold" fill="#c084fc">IDENTIDADE E ACESSO (IAM)</text>
  <text x="440" y="583" text-anchor="middle" font-size="11" fill="#a78bfa">Entra ID · AWS IAM Identity Center · GCP IAM · CyberArk · Okta · PIM · MFA · Zero Trust</text>
  <text x="440" y="600" text-anchor="middle" font-size="11" fill="#9333ea">BACEN 4.893 · LGPD · ISO 27001 · CIS Benchmarks · NIST CSF · MITRE ATT&amp;CK</text>
  <text x="440" y="616" text-anchor="middle" font-size="10" fill="#64748b">Contexto regulatório brasileiro integrado em todos os módulos do programa</text>

  <!-- ================== DEFINIÇÕES DE MARKERS ================== -->
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4285f4"/>
    </marker>
    <marker id="arr-azure" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0078d4"/>
    </marker>
    <marker id="arr-aws" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ff9900"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
