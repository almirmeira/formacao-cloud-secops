<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <!-- Fundo -->
  <rect width="900" height="560" fill="#0d1117" rx="12"/>

  <!-- Título (fonte sans-serif) -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0f6fc" font-family="Segoe UI, Arial, sans-serif">Anatomia de uma Regra YARA-L 2.0 — Google SecOps</text>
  <text x="450" y="50" text-anchor="middle" font-size="10" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif">CECyber · Curso 1 · Módulo 03 · Detection Engineering</text>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#21262d" stroke-width="1.5"/>

  <!-- Editor background -->
  <rect x="20" y="70" width="860" height="460" rx="8" fill="#161b22"/>

  <!-- Line numbers column -->
  <rect x="20" y="70" width="40" height="460" rx="8" fill="#0d1117"/>
  <rect x="50" y="70" width="10" height="460" fill="#21262d"/>

  <!-- Line numbers -->
  <text x="38" y="102" text-anchor="end" font-size="11" fill="#484f58">1</text>
  <text x="38" y="120" text-anchor="end" font-size="11" fill="#484f58">2</text>
  <text x="38" y="138" text-anchor="end" font-size="11" fill="#484f58">3</text>
  <text x="38" y="156" text-anchor="end" font-size="11" fill="#484f58">4</text>
  <text x="38" y="174" text-anchor="end" font-size="11" fill="#484f58">5</text>
  <text x="38" y="192" text-anchor="end" font-size="11" fill="#484f58">6</text>
  <text x="38" y="210" text-anchor="end" font-size="11" fill="#484f58">7</text>
  <text x="38" y="228" text-anchor="end" font-size="11" fill="#484f58">8</text>
  <text x="38" y="246" text-anchor="end" font-size="11" fill="#484f58">9</text>
  <text x="38" y="264" text-anchor="end" font-size="11" fill="#484f58">10</text>
  <text x="38" y="282" text-anchor="end" font-size="11" fill="#484f58">11</text>
  <text x="38" y="300" text-anchor="end" font-size="11" fill="#484f58">12</text>
  <text x="38" y="318" text-anchor="end" font-size="11" fill="#484f58">13</text>
  <text x="38" y="336" text-anchor="end" font-size="11" fill="#484f58">14</text>
  <text x="38" y="354" text-anchor="end" font-size="11" fill="#484f58">15</text>
  <text x="38" y="372" text-anchor="end" font-size="11" fill="#484f58">16</text>
  <text x="38" y="390" text-anchor="end" font-size="11" fill="#484f58">17</text>
  <text x="38" y="408" text-anchor="end" font-size="11" fill="#484f58">18</text>
  <text x="38" y="426" text-anchor="end" font-size="11" fill="#484f58">19</text>
  <text x="38" y="444" text-anchor="end" font-size="11" fill="#484f58">20</text>
  <text x="38" y="462" text-anchor="end" font-size="11" fill="#484f58">21</text>
  <text x="38" y="480" text-anchor="end" font-size="11" fill="#484f58">22</text>
  <text x="38" y="498" text-anchor="end" font-size="11" fill="#484f58">23</text>
  <text x="38" y="516" text-anchor="end" font-size="11" fill="#484f58">24</text>

  <!-- Código YARA-L com syntax highlighting -->
  <!-- Linha 1: rule keyword -->
  <text x="68" y="102" font-size="11" fill="#ff7b72">rule</text>
  <text x="100" y="102" font-size="11" fill="#ffa657"> password_spray_detection</text>
  <text x="352" y="102" font-size="11" fill="#e6edf3"> {</text>

  <!-- Linha 2: meta -->
  <!-- Highlight de seção -->
  <rect x="62" y="110" width="820" height="18" rx="3" fill="#1c2128"/>
  <text x="68" y="122" font-size="11" fill="#79c0ff">  meta:</text>

  <!-- Linhas 3-7: campos meta -->
  <text x="68" y="140" font-size="11" fill="#8b949e">    // Metadados da regra — não afetam a lógica de detecção</text>
  <text x="68" y="158" font-size="11" fill="#e6edf3">    </text>
  <text x="80" y="158" font-size="11" fill="#ffa657">author</text>
  <text x="134" y="158" font-size="11" fill="#e6edf3"> = </text>
  <text x="152" y="158" font-size="11" fill="#a5d6ff">"CECyber - Engenheiro de Detecção"</text>
  <text x="68" y="176" font-size="11" fill="#e6edf3">    </text>
  <text x="80" y="176" font-size="11" fill="#ffa657">severity</text>
  <text x="138" y="176" font-size="11" fill="#e6edf3"> = </text>
  <text x="156" y="176" font-size="11" fill="#a5d6ff">"HIGH"</text>
  <text x="68" y="194" font-size="11" fill="#e6edf3">    </text>
  <text x="80" y="194" font-size="11" fill="#ffa657">mitre_attack_technique</text>
  <text x="248" y="194" font-size="11" fill="#e6edf3"> = </text>
  <text x="266" y="194" font-size="11" fill="#a5d6ff">"T1110.003"</text>
  <text x="68" y="212" font-size="11" fill="#e6edf3">    </text>
  <text x="80" y="212" font-size="11" fill="#ffa657">false_positives</text>
  <text x="184" y="212" font-size="11" fill="#e6edf3"> = </text>
  <text x="202" y="212" font-size="11" fill="#a5d6ff">"Sistemas de teste de carga"</text>

  <!-- Linha 9: events -->
  <rect x="62" y="220" width="820" height="18" rx="3" fill="#1c2128"/>
  <text x="68" y="232" font-size="11" fill="#79c0ff">  events:</text>
  <text x="140" y="232" font-size="11" fill="#8b949e">  // ← Define QUAIS eventos capturar e COMO filtrar</text>

  <!-- Linhas 10-13: eventos -->
  <text x="68" y="250" font-size="11" fill="#e6edf3">    $</text>
  <text x="84" y="250" font-size="11" fill="#ffa657">e1</text>
  <text x="98" y="250" font-size="11" fill="#e6edf3">.metadata.event_type = </text>
  <text x="264" y="250" font-size="11" fill="#a5d6ff">"USER_LOGIN"</text>
  <text x="68" y="268" font-size="11" fill="#e6edf3">    $</text>
  <text x="84" y="268" font-size="11" fill="#ffa657">e1</text>
  <text x="98" y="268" font-size="11" fill="#e6edf3">.security_result.action = </text>
  <text x="258" y="268" font-size="11" fill="#a5d6ff">"BLOCK"</text>
  <text x="68" y="286" font-size="11" fill="#ff7b72">    not</text>
  <text x="100" y="286" font-size="11" fill="#e6edf3"> $</text>
  <text x="112" y="286" font-size="11" fill="#ffa657">e1</text>
  <text x="126" y="286" font-size="11" fill="#e6edf3">.target.user.email_addresses = </text>
  <text x="320" y="286" font-size="11" fill="#7ee787">/svc-.*/</text>
  <text x="376" y="286" font-size="11" fill="#8b949e">  // Exclui service accounts</text>

  <!-- Linha 14: match -->
  <rect x="62" y="294" width="820" height="18" rx="3" fill="#1c2128"/>
  <text x="68" y="306" font-size="11" fill="#79c0ff">  match:</text>
  <text x="122" y="306" font-size="11" fill="#8b949e">   // ← Define a JANELA TEMPORAL e o campo de AGRUPAMENTO</text>

  <!-- Linha 15: match content -->
  <text x="68" y="324" font-size="11" fill="#e6edf3">    $</text>
  <text x="84" y="324" font-size="11" fill="#ffa657">e1</text>
  <text x="98" y="324" font-size="11" fill="#e6edf3">.principal.ip </text>
  <text x="194" y="324" font-size="11" fill="#ff7b72">over</text>
  <text x="222" y="324" font-size="11" fill="#ffa657"> 15m</text>
  <text x="260" y="324" font-size="11" fill="#8b949e">  // Agrupa por IP de origem em janela de 15 minutos</text>

  <!-- Linha 16: condition -->
  <rect x="62" y="330" width="820" height="18" rx="3" fill="#1c2128"/>
  <text x="68" y="342" font-size="11" fill="#79c0ff">  condition:</text>
  <text x="148" y="342" font-size="11" fill="#8b949e"> // ← Define QUANTITATIVAMENTE quando o alerta dispara</text>

  <!-- Linhas 17-18: condition content -->
  <text x="68" y="360" font-size="11" fill="#ffa657">    #e1</text>
  <text x="104" y="360" font-size="11" fill="#ff7b72"> >=</text>
  <text x="126" y="360" font-size="11" fill="#79c0ff"> 10</text>
  <text x="152" y="360" font-size="11" fill="#8b949e">                        // Mínimo 10 logins bloqueados</text>
  <text x="68" y="378" font-size="11" fill="#e6edf3">    </text>
  <text x="80" y="378" font-size="11" fill="#ff7b72">count</text>
  <text x="116" y="378" font-size="11" fill="#e6edf3">(</text>
  <text x="122" y="378" font-size="11" fill="#ff7b72">distinct</text>
  <text x="168" y="378" font-size="11" fill="#e6edf3"> $</text>
  <text x="180" y="378" font-size="11" fill="#ffa657">e1</text>
  <text x="194" y="378" font-size="11" fill="#e6edf3">.target.user.email_addresses) </text>
  <text x="396" y="378" font-size="11" fill="#ff7b72">>=</text>
  <text x="416" y="378" font-size="11" fill="#79c0ff"> 5</text>
  <text x="432" y="378" font-size="11" fill="#8b949e">  // Min 5 usuários distintos</text>

  <!-- Linha 19: outcome -->
  <rect x="62" y="384" width="820" height="18" rx="3" fill="#1c2128"/>
  <text x="68" y="396" font-size="11" fill="#79c0ff">  outcome:</text>
  <text x="136" y="396" font-size="11" fill="#8b949e">  // ← Define o CONTEÚDO do alerta gerado</text>

  <!-- Linhas 20-23: outcome content -->
  <text x="68" y="414" font-size="11" fill="#e6edf3">    $ip_origem     = </text>
  <text x="204" y="414" font-size="11" fill="#ff7b72">array_distinct</text>
  <text x="310" y="414" font-size="11" fill="#e6edf3">($</text>
  <text x="322" y="414" font-size="11" fill="#ffa657">e1</text>
  <text x="336" y="414" font-size="11" fill="#e6edf3">.principal.ip)</text>
  <text x="68" y="432" font-size="11" fill="#e6edf3">    $usuarios_alvo = </text>
  <text x="196" y="432" font-size="11" fill="#ff7b72">array_distinct</text>
  <text x="302" y="432" font-size="11" fill="#e6edf3">($</text>
  <text x="314" y="432" font-size="11" fill="#ffa657">e1</text>
  <text x="328" y="432" font-size="11" fill="#e6edf3">.target.user.email_addresses)</text>
  <text x="68" y="450" font-size="11" fill="#e6edf3">    $total         = </text>
  <text x="196" y="450" font-size="11" fill="#ff7b72">count</text>
  <text x="232" y="450" font-size="11" fill="#e6edf3">($</text>
  <text x="244" y="450" font-size="11" fill="#ffa657">e1</text>
  <text x="258" y="450" font-size="11" fill="#e6edf3">)</text>
  <text x="68" y="468" font-size="11" fill="#e6edf3">    $severity      = </text>
  <text x="204" y="468" font-size="11" fill="#a5d6ff">"HIGH"</text>
  <text x="68" y="486" font-size="11" fill="#e6edf3">    $risk_score    = </text>
  <text x="204" y="486" font-size="11" fill="#79c0ff">85</text>

  <!-- Última linha: fechamento -->
  <text x="68" y="504" font-size="11" fill="#e6edf3">}</text>

  <!-- Legendas das seções (lado direito) -->
  <!-- META arrow -->
  <line x1="740" y1="122" x2="780" y2="122" stroke="#79c0ff" stroke-width="1.5"/>
  <rect x="782" y="110" width="100" height="24" rx="4" fill="#1c2128" stroke="#79c0ff" stroke-width="1"/>
  <text x="832" y="125" text-anchor="middle" font-size="9" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif">METADADOS</text>

  <!-- EVENTS arrow -->
  <line x1="740" y1="265" x2="780" y2="265" stroke="#79c0ff" stroke-width="1.5"/>
  <rect x="782" y="255" width="100" height="24" rx="4" fill="#1c2128" stroke="#79c0ff" stroke-width="1"/>
  <text x="832" y="270" text-anchor="middle" font-size="9" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif">EVENTOS</text>

  <!-- MATCH arrow -->
  <line x1="740" y1="315" x2="780" y2="315" stroke="#ffa657" stroke-width="1.5"/>
  <rect x="782" y="305" width="100" height="24" rx="4" fill="#1c2128" stroke="#ffa657" stroke-width="1"/>
  <text x="832" y="320" text-anchor="middle" font-size="9" fill="#ffa657" font-family="Segoe UI, Arial, sans-serif">JANELA</text>

  <!-- CONDITION arrow -->
  <line x1="740" y1="365" x2="780" y2="365" stroke="#7ee787" stroke-width="1.5"/>
  <rect x="782" y="355" width="100" height="24" rx="4" fill="#1c2128" stroke="#7ee787" stroke-width="1"/>
  <text x="832" y="370" text-anchor="middle" font-size="9" fill="#7ee787" font-family="Segoe UI, Arial, sans-serif">CRITÉRIOS</text>

  <!-- OUTCOME arrow -->
  <line x1="740" y1="440" x2="780" y2="440" stroke="#ff7b72" stroke-width="1.5"/>
  <rect x="782" y="430" width="100" height="24" rx="4" fill="#1c2128" stroke="#ff7b72" stroke-width="1"/>
  <text x="832" y="445" text-anchor="middle" font-size="9" fill="#ff7b72" font-family="Segoe UI, Arial, sans-serif">ALERTA</text>
</svg>
